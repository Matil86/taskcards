name: Continuous Deployment

concurrency:
  group: taskcards-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      deploy_track:
        description: 'Initial deployment track (future enhancement)'
        required: false
        type: choice
        options:
          - internal
          - alpha
          - beta
        default: 'internal'

jobs:
  # ==========================================
  # STAGE 1: Quality Gates (CI)
  # ==========================================
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Cache Gradle build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > app/google-services.json

      - name: Validate google-services.json
        run: |
          if ! python3 -m json.tool app/google-services.json > /dev/null 2>&1; then
            echo "❌ google-services.json is not valid JSON!"
            exit 1
          fi
          echo "✅ google-services.json is valid"

      - name: Run Quality Gates (Build, Test, Lint)
        run: ./gradlew assembleDebug test lint --parallel

      # Code Coverage - Same as CI
      - name: Generate Coverage Report
        if: always()
        run: ./gradlew koverXmlReport koverHtmlReport

      - name: Verify Coverage Thresholds (90% line, 85% branch)
        run: ./gradlew koverVerify

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cd-coverage-report
          path: |
            app/build/reports/kover/html/
            app/build/reports/kover/report.xml

      - name: Run Static Analysis (Detekt)
        run: ./gradlew detekt
        # Zero issues achieved - enforcing quality standard going forward

      - name: Upload Detekt Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cd-detekt-report
          path: app/build/reports/detekt/

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/build/test-results/test*/TEST-*.xml'
          detailed_summary: true
          include_passed: true

      - name: Upload Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            app/build/reports/tests/
            app/build/test-results/

  # ==========================================
  # NOTE: Instrumented tests disabled due to emulator issues in GitHub Actions
  # Run locally: ./gradlew connectedDebugAndroidTest
  # ==========================================

  # ==========================================
  # STAGE 2: Auto-Deploy to Internal
  # ==========================================
  deploy-internal:
    name: Deploy to Internal Track
    runs-on: ubuntu-latest
    needs: build-and-test
    environment:
      name: internal
      url: https://play.google.com/console

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Cache Gradle build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > app/google-services.json

      - name: Get current version
        id: version
        run: |
          VERSION_CODE=$(grep "versionCode = " app/build.gradle.kts | sed 's/.*versionCode = //' | sed 's/ .*//')
          VERSION_NAME=$(grep "versionName = " app/build.gradle.kts | sed 's/.*versionName = "//' | sed 's/".*//')
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "📦 Current version: $VERSION_NAME ($VERSION_CODE)"

      - name: Decode keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release.keystore
          echo "Keystore decoded to: ${{ github.workspace }}/release.keystore"
          ls -lh ${{ github.workspace }}/release.keystore

      - name: Build Release AAB
        run: ./gradlew bundleRelease
        env:
          RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload to Play Store (Internal)
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: de.hipp.app.taskcards
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          inAppUpdatePriority: 2

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: internal-apk-v${{ steps.version.outputs.name }}
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: internal-aab-v${{ steps.version.outputs.name }}
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Deployment Summary
        run: |
          echo "## ✅ Deployed to Internal Track" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ steps.version.outputs.name }} (Code: ${{ steps.version.outputs.code }})" >> $GITHUB_STEP_SUMMARY
          echo "**Track**: Internal" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "To promote this release:" >> $GITHUB_STEP_SUMMARY
          echo "1. Test the internal release thoroughly" >> $GITHUB_STEP_SUMMARY
          echo "2. Approve the **promote-to-alpha** job to publish to alpha testers" >> $GITHUB_STEP_SUMMARY
          echo "3. Further promotions to beta and production require separate approvals" >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # STAGE 2.5: Smoke Tests (Verify Deployment)
  # ==========================================
  smoke-test-internal:
    name: Smoke Test Internal Release
    runs-on: ubuntu-latest
    needs: deploy-internal

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          pattern: internal-apk-*
          merge-multiple: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: AVD cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-smoke-test

      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h

          # Remove unnecessary software to free up ~10GB
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

          echo "Disk space after cleanup:"
          df -h

      - name: Clean up stale emulators
        continue-on-error: true
        run: |
          # Start adb server if not running
          adb start-server || true
          sleep 2

          # Kill any existing emulators
          adb devices | grep emulator | cut -f1 | while read line; do adb -s $line emu kill; done || true

          # Wait for cleanup to complete
          sleep 2

          # Clean up any stale lock files
          rm -rf ~/.android/avd/*.avd/*.lock || true

          # Ensure no emulator is running on port 5554
          lsof -ti:5554 | xargs kill -9 2>/dev/null || true

      - name: Run Smoke Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        timeout-minutes: 45
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -accel auto
          disable-animations: true
          disk-size: 4096M
          heap-size: 512M
          ram-size: 2048M
          pre-emulator-launch-script: |
            # Ensure adb server is running and healthy
            adb start-server
            sleep 1
            # Gracefully handle cleanup of non-existent emulator
            adb -s emulator-5554 emu kill 2>/dev/null || true
          script: |
            echo "=== Disk Space Check ==="
            df -h | grep -E "Filesystem|/$"
            FREE_SPACE=$(df -BM / | awk 'NR==2 {print $4}' | sed 's/M//')
            echo "Free space: ${FREE_SPACE}MB"
            if [ "$FREE_SPACE" -lt 5000 ]; then
              echo "ERROR: Insufficient disk space (${FREE_SPACE}MB < 5000MB)"
              exit 1
            fi
            echo "Disk space check passed"
            echo ""

            echo "Waiting for emulator to fully boot..."
            adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
            sleep 10

            echo "Verifying emulator is responsive..."
            adb devices
            adb shell getprop ro.build.version.sdk
            adb shell input keyevent 82

            echo "Running smoke tests on internal release..."

            # Find the APK
            APK_PATH=$(find . -name "app-release.apk" | head -1)
            echo "Installing APK: $APK_PATH"

            # Install the APK with error handling
            adb install -r -g "$APK_PATH" || {
              echo "APK installation failed!"
              adb logcat -d | tail -100
              exit 1
            }
            echo "APK installed successfully"

            # Verify APK is actually installed
            if ! adb shell pm list packages | grep -q "de.hipp.app.taskcards"; then
              echo "App package not found after installation!"
              exit 1
            fi
            echo "App package verified in system"

            # Grant necessary permissions
            echo "Granting permissions..."
            adb shell pm grant de.hipp.app.taskcards android.permission.POST_NOTIFICATIONS || true
            adb shell pm grant de.hipp.app.taskcards android.permission.CAMERA || true

            # Launch the app
            echo "Launching app..."
            adb shell am start -n de.hipp.app.taskcards/.MainActivity
            sleep 10

            # Verify app is running
            echo "Verifying app is running..."
            if adb shell dumpsys activity activities | grep -q "de.hipp.app.taskcards"; then
              echo "App launched successfully"
            else
              echo "App failed to launch!"
              adb logcat -d | tail -100
              exit 1
            fi

            # Check for crashes
            echo "Checking for crashes..."
            if adb logcat -d | grep -q "FATAL EXCEPTION"; then
              echo "App crashed during smoke test!"
              adb logcat -d | grep -A 20 "FATAL EXCEPTION"
              exit 1
            fi
            echo "No crashes detected"

            # Verify main screen elements (basic UI check)
            echo "Checking UI elements..."
            adb shell uiautomator dump
            if adb shell cat /sdcard/window_dump.xml | grep -q "task"; then
              echo "Main UI elements present"
            else
              echo "Warning: Could not verify UI elements"
            fi

            # Take screenshot for manual review
            echo "Taking screenshot..."
            adb shell screencap -p /sdcard/smoke_test.png
            adb pull /sdcard/smoke_test.png smoke_test_screenshot.png || true

            echo ""
            echo "Smoke tests PASSED!"
            echo "- APK installs correctly"
            echo "- App launches without crashing"
            echo "- Main activity loads"
            echo "- No fatal exceptions detected"

      - name: Upload Smoke Test Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-screenshot
          path: smoke_test_screenshot.png

      - name: Smoke Test Summary
        if: always()
        run: |
          echo "## 🧪 Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Internal Release Verification" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ APK installation successful" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ App launches without crashes" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Main activity loads correctly" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No fatal exceptions in logcat" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📸 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Screenshot of app after launch (see artifacts)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Deployment Verified" >> $GITHUB_STEP_SUMMARY
          echo "Internal release is functional and ready for testing." >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # STAGE 3: Promote to Alpha (Manual Approval)
  # ==========================================
  promote-to-alpha:
    name: Promote to Alpha Track
    runs-on: ubuntu-latest
    needs: smoke-test-internal  # Must pass smoke tests before promotion
    environment:
      name: alpha
      url: https://play.google.com/console

    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          pattern: internal-aab-*

      - name: Get version from artifact name
        id: version
        run: |
          AAB_DIR=$(ls -d internal-aab-* | head -1)
          VERSION_NAME=${AAB_DIR#internal-aab-v}
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "📦 Promoting version: $VERSION_NAME"

      - name: Promote to Alpha
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: de.hipp.app.taskcards
          releaseFiles: internal-aab-*/app-release.aab
          track: alpha
          status: completed
          inAppUpdatePriority: 3

      - name: Promotion Summary
        run: |
          echo "## ✅ Promoted to Alpha Track" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ steps.version.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Track**: Alpha" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "To promote this release to beta:" >> $GITHUB_STEP_SUMMARY
          echo "1. Monitor alpha testers' feedback" >> $GITHUB_STEP_SUMMARY
          echo "2. Approve the **promote-to-beta** job when ready" >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # STAGE 4: Promote to Beta (Manual Approval)
  # ==========================================
  promote-to-beta:
    name: Promote to Beta Track
    runs-on: ubuntu-latest
    needs: promote-to-alpha
    environment:
      name: beta
      url: https://play.google.com/console

    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          pattern: internal-aab-*

      - name: Get version from artifact name
        id: version
        run: |
          AAB_DIR=$(ls -d internal-aab-* | head -1)
          VERSION_NAME=${AAB_DIR#internal-aab-v}
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "📦 Promoting version: $VERSION_NAME"

      - name: Promote to Beta
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: de.hipp.app.taskcards
          releaseFiles: internal-aab-*/app-release.aab
          track: beta
          status: completed
          inAppUpdatePriority: 4

      - name: Promotion Summary
        run: |
          echo "## ✅ Promoted to Beta Track" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ steps.version.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Track**: Beta" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "To promote this release to production:" >> $GITHUB_STEP_SUMMARY
          echo "1. Monitor beta testers' feedback carefully" >> $GITHUB_STEP_SUMMARY
          echo "2. Ensure all critical issues are resolved" >> $GITHUB_STEP_SUMMARY
          echo "3. Approve the **promote-to-production** job for final release" >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # STAGE 5: Promote to Production (Manual Approval)
  # ==========================================
  promote-to-production:
    name: Promote to Production Track
    runs-on: ubuntu-latest
    needs: promote-to-beta
    environment:
      name: production
      url: https://play.google.com/console

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          pattern: internal-aab-*

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          pattern: internal-apk-*

      - name: Get version from artifact name
        id: version
        run: |
          AAB_DIR=$(ls -d internal-aab-* | head -1)
          VERSION_NAME=${AAB_DIR#internal-aab-v}
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "📦 Promoting version: $VERSION_NAME to PRODUCTION"

      - name: Promote to Production
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: de.hipp.app.taskcards
          releaseFiles: internal-aab-*/app-release.aab
          track: production
          status: completed
          inAppUpdatePriority: 5

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.name }}
          name: Release v${{ steps.version.outputs.name }}
          body: |
            ## TaskCards v${{ steps.version.outputs.name }}

            ### 🎉 Production Release

            This release has been promoted through all testing tracks:
            - ✅ Internal testing
            - ✅ Alpha testing
            - ✅ Beta testing
            - ✅ Production release

            ### 📥 Downloads
            - AAB for Play Store distribution
            - APK for direct sideloading

            ### 🔗 Links
            - [Play Store Listing](https://play.google.com/store/apps/details?id=de.hipp.app.taskcards)
            - [Play Console](https://play.google.com/console)

            ### 📝 Commit
            ${{ github.sha }}
          files: |
            internal-aab-*/app-release.aab
            internal-apk-*/app-release.apk
          draft: false
          prerelease: false

      - name: Production Release Summary
        run: |
          echo "## 🎉 Released to Production!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ steps.version.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Track**: Production" >> $GITHUB_STEP_SUMMARY
          echo "**GitHub Release**: [v${{ steps.version.outputs.name }}](https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.name }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "The app is now live in production for all users!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Monitor" >> $GITHUB_STEP_SUMMARY
          echo "- Watch Play Console for crash reports and ANRs" >> $GITHUB_STEP_SUMMARY
          echo "- Monitor user reviews and ratings" >> $GITHUB_STEP_SUMMARY
          echo "- Check Firebase Analytics for usage metrics" >> $GITHUB_STEP_SUMMARY
