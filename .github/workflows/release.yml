name: Build and Publish Release

on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: 'Dry run (build only, do not publish)'
        required: true
        default: true
        type: boolean
      track:
        description: 'Play Store track (internal/alpha/beta/production)'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      versionName:
        description: 'Version name (e.g., 1.0.0)'
        required: true
        type: string
      versionCode:
        description: 'Version code (integer, must be higher than previous)'
        required: true
        type: string

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Cache Gradle build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Start Timer
        id: timer
        run: echo "start_time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Create google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > app/google-services.json

      # NOTE: Quality gates run in CI workflow, not duplicated here
      # This workflow assumes CI has passed (enforced by branch protection)

      - name: Update version in build.gradle.kts
        run: |
          sed -i "s/versionCode = [0-9]*/versionCode = ${{ github.event.inputs.versionCode }}/" app/build.gradle.kts
          sed -i "s/versionName = \".*\"/versionName = \"${{ github.event.inputs.versionName }}\"/" app/build.gradle.kts

      - name: Decode keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Build Release AAB
        run: ./gradlew bundleRelease --scan
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Build Release APK
        run: ./gradlew assembleRelease --scan
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload to Play Store
        if: ${{ github.event.inputs.dryRun == 'false' }}
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: de.hipp.app.taskcards
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track }}
          status: completed
          inAppUpdatePriority: 2

      - name: Create GitHub Release
        if: ${{ github.event.inputs.dryRun == 'false' }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.versionName }}
          name: Release v${{ github.event.inputs.versionName }}
          body: |
            ## TaskCards v${{ github.event.inputs.versionName }}

            ### Build Information
            - Version Code: ${{ github.event.inputs.versionCode }}
            - Version Name: ${{ github.event.inputs.versionName }}
            - Track: ${{ github.event.inputs.track }}

            ### Downloads
            - AAB for Play Store
            - APK for sideloading
          files: |
            app/build/outputs/bundle/release/app-release.aab
            app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: ${{ github.event.inputs.track != 'production' }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-v${{ github.event.inputs.versionName }}
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-v${{ github.event.inputs.versionName }}
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Build Summary
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - ${{ steps.timer.outputs.start_time }}))
          MINUTES=$((DURATION / 60))
          SECONDS=$((DURATION % 60))

          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏱️ **Total Duration**: ${MINUTES}m ${SECONDS}s" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Version Name**: ${{ github.event.inputs.versionName }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version Code**: ${{ github.event.inputs.versionCode }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Track**: ${{ github.event.inputs.track }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry Run**: ${{ github.event.inputs.dryRun }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🚀 **Optimizations Active**: Build caching, Gradle optimization flags" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.event.inputs.dryRun }}" == "true" ]; then
            echo "### ⚠️ Dry Run Mode" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ Release APK and AAB built successfully" >> $GITHUB_STEP_SUMMARY
            echo "⏭️ Play Store upload **SKIPPED** (dry run enabled)" >> $GITHUB_STEP_SUMMARY
            echo "⏭️ GitHub Release creation **SKIPPED** (dry run enabled)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📦 Download Artifacts" >> $GITHUB_STEP_SUMMARY
            echo "Download the built files from the **Artifacts** section above to test locally." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🚀 To Publish for Real" >> $GITHUB_STEP_SUMMARY
            echo "Run this workflow again with **Dry run = false** to publish to Play Store and create GitHub Release." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📖 **Setup Guide**: [docs/release-quick-start.md](docs/release-quick-start.md)" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ Release Published" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ Release APK and AAB built successfully" >> $GITHUB_STEP_SUMMARY
            echo "✅ AAB uploaded to Play Store (${{ github.event.inputs.track }} track)" >> $GITHUB_STEP_SUMMARY
            echo "✅ GitHub Release created: [v${{ github.event.inputs.versionName }}](https://github.com/${{ github.repository }}/releases/tag/v${{ github.event.inputs.versionName }})" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🎉 What's Next" >> $GITHUB_STEP_SUMMARY
            echo "1. Check Play Console for the new release on ${{ github.event.inputs.track }} track" >> $GITHUB_STEP_SUMMARY
            echo "2. Download APK/AAB from GitHub Releases for distribution" >> $GITHUB_STEP_SUMMARY
            echo "3. Test the release before rolling out to more users" >> $GITHUB_STEP_SUMMARY
          fi
