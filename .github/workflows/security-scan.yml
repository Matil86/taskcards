name: Nightly Security Scan

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC täglich
  workflow_dispatch:        # manuell auslösbar

jobs:
  owasp-scan:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Cache OWASP NVD database
        uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: owasp-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: |
            owasp-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > app/google-services.json

      - name: Run Security Scan (OWASP Dependency Check)
        run: ./gradlew dependencyCheckAnalyze

      - name: Upload OWASP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report-${{ github.run_id }}
          path: app/build/reports/dependency-check-report.*
          retention-days: 30

      - name: Security Scan Summary
        if: always()
        run: |
          echo "## 🔒 Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Report uploaded as artifact \`owasp-report-${{ github.run_id }}\` (retention: 30 days)" >> $GITHUB_STEP_SUMMARY
