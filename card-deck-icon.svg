<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Neutral background -->
  <rect width="512" height="512" fill="#E8E8E8" rx="115"/>
  
  <!-- Deckbox base -->
  <g transform="translate(256, 300)">
    <!-- Box shadow -->
    <rect x="-85" y="0" width="170" height="100" fill="#8B7355" rx="8"/>
    
    <!-- Box front face -->
    <rect x="-85" y="-10" width="170" height="100" fill="#A0826D" rx="8"/>
    
    <!-- Box top edge -->
    <ellipse cx="0" cy="-10" rx="85" ry="20" fill="#8B7355"/>
    <ellipse cx="0" cy="-10" rx="85" ry="18" fill="#B8956F"/>
    
    <!-- Box detail line -->
    <rect x="-80" y="20" width="160" height="2" fill="#8B7355" opacity="0.5"/>
  </g>
  
  <!-- Cards being drawn out -->
  <!-- Card 3 (back) -->
  <g transform="translate(256, 200) rotate(-8)">
    <rect x="-50" y="-70" width="100" height="140" fill="#FFFFFF" rx="8" stroke="#333" stroke-width="3"/>
    <rect x="-40" y="-60" width="80" height="120" fill="#4A90E2" rx="4"/>
    <circle cx="0" cy="0" r="25" fill="#FFFFFF" opacity="0.3"/>
  </g>
  
  <!-- Card 2 (middle) -->
  <g transform="translate(256, 190) rotate(0)">
    <rect x="-50" y="-70" width="100" height="140" fill="#FFFFFF" rx="8" stroke="#333" stroke-width="3"/>
    <rect x="-40" y="-60" width="80" height="120" fill="#E74C3C" rx="4"/>
    <circle cx="0" cy="0" r="25" fill="#FFFFFF" opacity="0.3"/>
  </g>
  
  <!-- Card 1 (front) -->
  <g transform="translate(256, 180) rotate(8)">
    <rect x="-50" y="-70" width="100" height="140" fill="#FFFFFF" rx="8" stroke="#333" stroke-width="3"/>
    <rect x="-40" y="-60" width="80" height="120" fill="#27AE60" rx="4"/>
    <circle cx="0" cy="0" r="25" fill="#FFFFFF" opacity="0.3"/>
  </g>
</svg>